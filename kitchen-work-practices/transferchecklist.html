<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="/cptlmenu/style.css">



</head>
<body>
  <header>
    <a href="/cptlmenu/index.html">
      <img src="/cptlmenu/kitchen-recipes/img/capital-logo.png" alt="Header Image" class="header-img">
    </a>
      <button id="darkModeToggle">Dark Mode</button>
  </header>

<main>

  <p class="main-text">This checklist is to be filled out at the transfer from the morning to closing shifts.</p>

  <div class="form-wrapper">
    <form class="custom-form">

      <!-- Date -->
      <div class="form-row">
        <label for="today-date">Today's Date:</label>
        <input type="date" id="today-date" name="today-date" required>
      </div>

      <!-- TASK LIST -->
      <div class="task-list">

        <div class="task-row">
          <h3>Knives clean</h3>
          <select class="employee-select" name="knives-clean" required></select>
        </div>

        <div class="task-row">
          <h3>Cold-station refill</h3>
          <select class="employee-select" name="cold-refill" required></select>
        </div>

        <div class="task-row">
          <h3>Cold-side stations clean</h3>
          <select class="employee-select" name="cold-stations-clean" required></select>
        </div>

        <div class="task-row">
          <h3>Garbage disposal (if necessary)</h3>
          <select class="employee-select" name="garbage-disposal" required></select>
        </div>

      </div>
      <button type="button" onclick="preparePrint()" class="submit-btn">Save as PDF</button>


    </form>
  </div>

</main>

  <script src="/cptlmenu/script.js"></script>
  <script>
const employees = [
  "Ana", "Daniel", "Ilyes", "Jennifer", "Khaled",
  "Lidia", "Omiros", "Paulo", "Rene", "Sâmella", "Tiame"
];

document.querySelectorAll(".employee-select").forEach(select => {
  // Add placeholder
  const placeholder = document.createElement("option");
  placeholder.textContent = "Responsible Employee:";
  placeholder.value = ""; // IMPORTANT for validation
  placeholder.disabled = true;
  placeholder.selected = true;
  placeholder.hidden = true;
  select.appendChild(placeholder);

  // Add employees
  employees.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
});

function preparePrint() {
  const form = document.querySelector(".custom-form");

  // ✅ Trigger validation
  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  // Prevent duplicate spans if clicked multiple times
  document.querySelectorAll(".print-value").forEach(el => el.remove());

  // Loop through all selects
  document.querySelectorAll(".employee-select").forEach(select => {
    const selectedText = select.options[select.selectedIndex]?.text;

    if (selectedText) {
      const span = document.createElement("span");
      span.textContent = selectedText;
      span.className = "print-value";

      select.style.display = "none";
      select.parentNode.appendChild(span);
    }
  });

  // Handle date
  const dateInput = document.getElementById("today-date");
  if (dateInput.value) {
    const span = document.createElement("span");
    span.textContent = dateInput.value;
    span.className = "print-value";

    dateInput.style.display = "none";
    dateInput.parentNode.appendChild(span);
  }

  // Print AFTER DOM update
  setTimeout(() => {
    window.print();

    // OPTIONAL: restore form after printing (so user can edit again)
    setTimeout(() => {
      document.querySelectorAll(".employee-select").forEach(select => {
        select.style.display = "";
      });

      if (dateInput) {
        dateInput.style.display = "";
      }

      document.querySelectorAll(".print-value").forEach(el => el.remove());
    }, 500);
  }, 300);
}
</script>

</body>

</html>
